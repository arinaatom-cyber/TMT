<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Human Proteome Atlas — Interactive Tissue Map</title>
<meta name="description" content="Interactive map of TMT proteomics projects by organ and tissue.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c1018;--bg2:#141b28;--card:#1a2332;--hover:#243044;
  --border:#2d3a52;--accent:#5b8fa8;--accent-dim:rgba(91,143,168,.15);
  --glow:rgba(91,143,168,.2);
  --t1:#e6eaf2;--t2:#94a3b8;--t3:#64748b;
  --green:#6b9a7a;--red:#b86b6b;--muted:#8a9098;
  --radius:10px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}

html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loader.hidden{opacity:0;pointer-events:none}
.spinner{width:50px;height:50px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{margin-top:16px;color:var(--t2);font-size:13px;letter-spacing:2px;text-transform:uppercase}

.header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1500px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:8px;background:var(--accent-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo h1{font-size:15px;font-weight:700;letter-spacing:.04em;color:var(--t1)}
.logo span{font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;display:block;font-weight:500}
.hstats{display:flex;gap:20px;flex-wrap:wrap}
.hstat{text-align:center;min-width:56px}
.hstat .v{font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.hstat .l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}

.app{max-width:1600px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:minmax(260px,300px) minmax(380px,440px) minmax(320px,1fr);gap:20px;align-items:start;min-height:calc(100vh - 64px)}
@media(max-width:1200px){.app{grid-template-columns:1fr;max-width:820px}.body-col{order:-1}}

.panel{display:flex;flex-direction:column;gap:16px;max-height:calc(100vh - 100px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .3s}
.card:hover{border-color:var(--accent)}
.card-head{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2)}
.card-head h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t1);border-left:3px solid var(--accent);padding-left:10px}

.olist{padding:8px}
.oitem{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.oitem:hover:not(.off){background:var(--hover);border-color:var(--accent);transform:translateX(3px)}
.oitem.on{background:rgba(74,144,217,.15);border-color:var(--accent);box-shadow:0 0 12px var(--glow)}
.oitem.off{opacity:.25;cursor:default;pointer-events:none}
.odot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.oitem .nm{flex:1;font-size:12px;font-weight:500}
.oitem .ct{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:20px;min-width:28px;text-align:center;font-variant-numeric:tabular-nums}

.search{position:relative;margin-bottom:12px}
.search input{width:100%;padding:10px 14px 10px 36px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--t1);font-size:13px;outline:none;transition:border-color .3s}
.search input:focus{border-color:var(--accent)}
.search input::placeholder{color:var(--t3)}
.search .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px}

.body-col{display:flex;flex-direction:column;align-items:center}
.body-wrap{position:relative;width:100%;max-width:440px;margin:0 auto}
.body-wrap svg{width:100%;height:auto;display:block;filter:drop-shadow(0 0 30px rgba(74,144,217,.08))}

.body-out{fill:#181f33;stroke:#2a3654;stroke-width:1}
.body-inner{fill:none;stroke:#334155;stroke-width:.4;opacity:.5}

.org{cursor:pointer;transition:all .25s;stroke:rgba(255,255,255,.12);stroke-width:.6}
.org:hover:not(.off){filter:brightness(1.45) drop-shadow(0 0 6px currentColor);stroke:#fff;stroke-width:1.4}
.org.hi{filter:brightness(1.5) drop-shadow(0 0 10px currentColor);stroke:#fff;stroke-width:2;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:brightness(1.5) drop-shadow(0 0 10px currentColor)}50%{filter:brightness(1.75) drop-shadow(0 0 18px currentColor)}}
.org.off{fill:#1f2535 !important;cursor:default;pointer-events:none;opacity:.35}

.lead{stroke:#4a5573;stroke-width:.7;fill:none;opacity:.65;pointer-events:none}
.lead.hi{stroke:currentColor;opacity:1;stroke-width:1.2}
.lead.off{opacity:.12}

.cb{cursor:pointer;transition:all .25s}
.cb.off{opacity:.3;cursor:default;pointer-events:none}
.cb-pill{rx:10;ry:10;fill:#1a2236;stroke:#334155;stroke-width:.8;transition:all .25s}
.cb:hover:not(.off) .cb-pill{fill:#243049;stroke:#fff;stroke-width:1.5}
.cb.hi .cb-pill{stroke:#fff;stroke-width:1.8;fill:#243049}
.cb-name{font-family:Inter,system-ui,sans-serif;font-size:7.5px;font-weight:600;fill:#e6eaf2;text-anchor:start;pointer-events:none;dominant-baseline:middle}
.cb-name.right{text-anchor:end}
.cb-count{font-family:Inter,system-ui,sans-serif;font-size:7.5px;font-weight:700;text-anchor:middle;pointer-events:none;dominant-baseline:middle}
.cb-dot{pointer-events:none}

.tip{position:absolute;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;white-space:nowrap}
.tip .tn{font-weight:700;color:var(--accent)}
.tip .tc{color:var(--t2);margin-top:2px}

.detail{display:flex;flex-direction:column;gap:16px;max-height:calc(100vh - 100px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;border:2px dashed var(--border);border-radius:var(--radius);color:var(--t3);text-align:center;gap:12px}
.placeholder .bi{font-size:48px;opacity:.4}
.placeholder p{font-size:13px;line-height:1.7}

.hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:16px;border-left:4px solid var(--accent)}
@media(max-width:700px){.mstats{grid-template-columns:repeat(2,1fr)}}
.hero .ic{width:48px;height:48px;border-radius:8px;flex-shrink:0}
.hero-title{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.hero .sub{font-size:12px;color:var(--t2);margin-top:4px;font-weight:400}

.mstats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ms{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.ms .v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t1)}
.ms .v.accent{font-weight:700}
.ms .l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;font-weight:500}

.sec-h{font-size:11px;font-weight:600;color:var(--t1);text-transform:uppercase;letter-spacing:.08em;margin:0 0 12px;padding:8px 12px;background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0}
.sec-count{font-weight:700;color:var(--accent);margin-left:6px;font-variant-numeric:tabular-nums}

.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.ccard .sec-h{margin:-16px -16px 12px -16px;padding:10px 12px 10px 14px}
.ccard canvas{max-height:240px}

.dtags{display:flex;flex-wrap:wrap;gap:6px}
.dtag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg2);transition:all .2s}
.dtag:hover{border-color:var(--accent);background:var(--hover)}
.dtag .dc{font-size:10px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.dtag .dd{width:7px;height:7px;border-radius:50%}

.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tcard .sec-h{margin:0;border-radius:0;border-bottom:1px solid var(--border);border-left:3px solid var(--accent)}
.tscroll{max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ptable{width:100%;border-collapse:collapse;font-size:12px}
.ptable th{background:var(--bg2);padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t1);text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0}
.ptable td{padding:8px 12px;border-bottom:1px solid rgba(45,58,82,.4);color:var(--t2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptable .pid{font-size:11px;font-weight:500;color:var(--accent);font-variant-numeric:tabular-nums}
.ptable tr:hover td{background:var(--hover)}
.ptable a{color:var(--accent);text-decoration:none}
.ptable a:hover{text-decoration:underline}
footer a{color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.charts-row{grid-template-columns:1fr}}

footer{text-align:center;padding:24px;color:var(--t3);font-size:11px;border-top:1px solid var(--border);margin-top:30px}
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading Proteome Data…</p>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon" aria-hidden="true">◉</div>
      <div>
        <h1>HUMAN PROTEOME ATLAS</h1>
        <span>Interactive Tissue Expression Map</span>
      </div>
    </div>
    <div class="hstats" id="hs"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="panel" id="lp"></div>

  <div class="body-col">
    <div class="body-wrap" id="bw"></div>
    <div class="tip" id="tip"></div>
  </div>

  <div class="detail" id="dc">
    <div class="placeholder">
      <div class="bi">🫁</div>
      <p>Click any organ on the body<br>or from the list to explore<br>TMT proteomics data</p>
    </div>
  </div>
</div>

<footer>Human Proteome Atlas · TMT proteomics atlas · Data: <a href="https://docs.google.com/spreadsheets/d/1M6hc3vmk1bNchMvEwXsIyyO5iq3mAzP877HTXzhzg38/edit?gid=1072380314" target="_blank" rel="noopener">Google Sheets</a> (PRIDE, CPTAC, PDC…)</footer>

<script src="app.js"></script>
</body>
</html>
